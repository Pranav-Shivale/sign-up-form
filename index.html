<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up form</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="main-container">
    <div class="img-container">
      <img src="images/side-img.jpg" alt="A Boxing ring" class="ring-img">
      <div class="logo-container">
        <img src="images/glove-logo.svg" alt="Boxing glove" class="glove-img">
        <div class="overlay-text">K. B. G.</div>
      </div>
      <div class="img-credit">
        Photo by <a href="https://unsplash.com/@jmuniz">Joel Muniz</a> on 
        <a href="https://unsplash.com/photos/people-watching-boxing-_wCdhOulQVc">
        Uplash</a>
      </div>
    </div>
    
    <div class="form-container">
      <div class="gym-intro">
        The Kamogawa Boxing Gym (鴨川ボクシングジム) is a boxing gym located in Tokyo,
        Japan. Founded, owned, and operated by Genji Kamogawa. <br><br> To join, 
        fill the form below.
      </div>
      <form>
        <div class="input-container">
          <h2>Let's do this!</h2>
          <div class="input-row">
            <div class="input-col">
              <label for="first_name">First Name</label>
              <input type="text" name="f_name" id="first_name" required>
            </div>
            <div class="input-col">
              <label for="last_name">Last Name</label>
              <input type="text" name="l_name" id="last_name" required>
            </div>
          </div>

          <div class="input-row">
            <div class="input-col">
              <label for="email">Email</label>
              <input type="email" name="mail" id="email" required>
            </div>
            <div class="input-col">
              <label for="phone_no">Phone Number</label>
              <input type="tel" name="phone_no" id="phone_no" required>
            </div>
          </div>

          <div class="input-row">
            <div class="input-col">
              <label for="password">Password</label>
              <input type="password" name="password" id="password" 
              required minlength="8" maxlength="72">
            </div>
            <div class="input-col">
              <label for="confirm_password">Confirm Password</label>
              <input type="password" name="confirm_password" id="confirm_password" 
              required minlength="8" maxlength="72">
            </div>
          </div>
        </div>

        <div class="submit-container">
          <button type="submit" class="submit-btn">Create Account</button>
        </div>
      </form>
      <div class="login">Already have an account? <a href="#">Log in</a></div>
    </div>
  </div>
</body>
</html>
